<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- MediaSyncView v2.0 · https://github.com/Rogala/MediaSyncView -->

<title>MediaSyncView</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<script>
(function(){var s=document.createElement('script');s.src='p5.min.js';s.onerror=function(){var f=document.createElement('script');f.src='https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js';document.head.appendChild(f);};document.head.appendChild(s);})();

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --tt:.18s;
  --bg:#0d0f12;--surface:#161a1f;--surface2:#1e2329;--border:#2a2f38;
  --text:#d8dde6;--muted:#5a6170;
  --blue:#3b82f6;--blue-h:#60a5fa;
  --green:#00e5a0;--green-h:#00ffb2;
  --red:#ef4444;--red-h:#f87171;
  --orange:#f59e0b;--orange-h:#fbbf24;
  --indigo:#6366f1;--indigo-h:#818cf8;
  --purple:#a855f7;--purple-h:#c084fc;
  --canvas-bg:#000;--canvas-br:#2a2f38;
  --glow-b:rgba(59,130,246,.25);--glow-g:rgba(0,229,160,.25);--glow-r:rgba(239,68,68,.25);
  --glow-o:rgba(245,158,11,.25);--glow-i:rgba(99,102,241,.25);--glow-p:rgba(168,85,247,.25);
}
body.light{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--border:#dde1e8;
  --text:#141720;--muted:#8a919e;--canvas-bg:#f5f5f5;--canvas-br:#c5cad4;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:stretch;height:100vh;padding:5px;gap:5px;transition:background var(--tt),color var(--tt);}
#app{width:100%;display:flex;flex-direction:column;gap:5px;height:100%;min-height:0}
#canvas-wrap{border:1.5px dashed var(--canvas-br);border-radius:.6rem;overflow:hidden;width:100%;flex:1;min-height:0;background:var(--canvas-bg);position:relative;transition:border-color var(--tt),background var(--tt);}
#canvas-wrap canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#annot-canvas{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;touch-action:none;}
body.annot-mode #annot-canvas{display:block;cursor:crosshair}
#split-divider{position:absolute;top:0;bottom:0;width:4px;background:var(--green);cursor:ew-resize;z-index:10;left:50%;transform:translateX(-50%);display:none;box-shadow:0 0 14px var(--glow-g);touch-action:none;}
#split-divider::after{content:'⟺';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--green);color:#000;font-size:10px;font-weight:900;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1;}
body.split-active #split-divider{display:block}
#panel{background:var(--surface);border:1px solid var(--border);border-radius:.6rem;padding:.36rem .65rem;display:flex;flex-direction:row;align-items:center;gap:.4rem;flex-shrink:0;box-shadow:0 4px 24px rgba(0,0,0,.25);transition:background var(--tt),border-color var(--tt);flex-wrap:nowrap;overflow-x:auto;overflow-y:visible;position:relative;z-index:10;}
body.fs-mode{padding:0;gap:0}
body.fs-mode #panel{display:none}
body.fs-mode #canvas-wrap{border-radius:0;border:none}
body.fs-mode.panel-visible #panel{display:flex;position:fixed;bottom:5px;left:5px;right:5px;z-index:500;border-radius:.6rem;}
body.panel-hidden #panel{display:none}
body.panel-hidden{gap:0}
.btn{font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;padding:.42rem .95rem;border-radius:.4rem;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:all var(--tt);background:var(--blue);color:#fff;flex-shrink:0;user-select:none;}
.btn:hover{background:var(--blue-h);transform:translateY(-1px);box-shadow:0 0 12px var(--glow-b)}
.btn:active{transform:translateY(0)}
.btn:disabled{background:var(--surface2)!important;color:var(--muted)!important;cursor:not-allowed;opacity:.5;transform:none!important;box-shadow:none!important;}
.btn-icon{padding:.42rem .5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:#fff;border:2px solid var(--border);}
body.light .btn-icon{color:#000}
.btn-icon:hover{background:var(--border);box-shadow:none;transform:translateY(-1px)}
body.light .btn-icon:hover{background:#c4cad8}
.btn-icon svg{width:1.1rem;height:1.1rem;pointer-events:none}
.btn-icon.active{background:var(--green);color:#000;border-color:transparent}
.btn-icon.active:hover{background:var(--green-h);box-shadow:0 0 10px var(--glow-g)}
.btn-green{background:var(--green);color:#000;border-color:transparent}
.btn-green:hover{background:var(--green-h);box-shadow:0 0 12px var(--glow-g)}
.btn-red{background:var(--red);color:#fff;border-color:transparent}
.btn-red:hover{background:var(--red-h);box-shadow:0 0 12px var(--glow-r)}
.btn-orange{background:var(--orange);color:#000;border-color:transparent}
.btn-orange:hover{background:var(--orange-h);box-shadow:0 0 12px var(--glow-o)}
.btn-indigo{background:var(--indigo);color:#fff;border-color:transparent}
.btn-indigo:hover{background:var(--indigo-h);box-shadow:0 0 12px var(--glow-i)}
.btn-purple{background:var(--purple);color:#fff;border-color:transparent}
.btn-purple:hover{background:var(--purple-h);box-shadow:0 0 12px var(--glow-p)}
#mute-btn.mute-on{background:var(--green);color:#000;border-color:transparent}
#mute-btn.mute-on:hover{background:var(--green-h);box-shadow:0 0 10px var(--glow-g)}
#mute-btn.mute-off{background:var(--red);color:#fff;border-color:transparent}
#mute-btn.mute-off:hover{background:var(--red-h);box-shadow:0 0 10px var(--glow-r)}
.row-btn{min-width:2.1rem;padding:.42rem .35rem;font-family:'JetBrains Mono',monospace;font-size:.92rem}
.num-input{width:50px;background:var(--surface2);border:1px solid var(--border);border-radius:.35rem;padding:.32rem .3rem;text-align:center;color:#fff;font-family:'JetBrains Mono',monospace;font-size:.92rem;font-weight:600;transition:border-color var(--tt);}
body.light .num-input{color:#000}
.num-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 6px var(--glow-b)}
label.lbl{font-size:.78rem;font-weight:700;color:#fff;letter-spacing:.03em;flex-shrink:0}
body.light label.lbl{color:#000}
input[type=range]{-webkit-appearance:none;height:5px;border-radius:3px;background:var(--surface2);border:1px solid var(--border);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--blue);border:2px solid var(--surface);cursor:pointer;transition:box-shadow var(--tt);}
input[type=range]:hover::-webkit-slider-thumb{box-shadow:0 0 8px var(--glow-b)}
#seek-slider{flex:1;min-width:80px}
.popup-wrap{position:relative;display:flex;align-items:center;flex-shrink:0}
.popup-menu{display:none;position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:.5rem;padding:.55rem .65rem;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;flex-direction:column;align-items:center;gap:.38rem;width:155px;}
.popup-menu.open{display:flex}
.popup-menu label.lbl{font-size:.68rem}
.popup-menu input[type=range]{width:100%}
.popup-val{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:600;background:var(--surface2);border:1px solid var(--border);border-radius:.3rem;padding:.12rem .38rem;min-width:3rem;text-align:center;}
#annot-menu{width:185px;gap:.45rem}
#annot-colors{display:flex;gap:.3rem;flex-wrap:wrap;justify-content:center}
.ac-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;}
.ac-swatch:hover{transform:scale(1.2)}
.ac-swatch.active{border-color:#fff!important}
#annot-size-row{display:flex;align-items:center;gap:.4rem;width:100%}
#annot-size-row label.lbl{font-size:.65rem}
#annot-size{flex:1}
#tile-menu{width:165px}
#tile-grid-sel{display:flex;gap:.3rem;justify-content:center}
.tile-opt{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;padding:.25rem .45rem;border-radius:.3rem;cursor:pointer;background:var(--surface2);border:1px solid var(--border);color:var(--text);transition:all var(--tt);}
.tile-opt:hover{background:var(--border)}
.tile-opt.active{background:var(--purple);color:#fff;border-color:transparent}
#time-block{display:flex;flex-direction:row;align-items:center;gap:.5rem;flex-shrink:0}
#timecode{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:600;color:#fff;letter-spacing:.04em}
body.light #timecode{color:#000}
#frame-counter{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:600;color:#fff}
body.light #frame-counter{color:#000}
#theme-btn{background:#fff;color:#000;border-color:#fff}
#theme-btn:hover{background:#e0e0e0;border-color:#e0e0e0;box-shadow:none}
body.light #theme-btn{background:#000;color:#fff;border-color:#000}
body.light #theme-btn:hover{background:#222;border-color:#222;box-shadow:none}
.sep{width:1px;height:1.15rem;background:var(--border);flex-shrink:0}
#file-input{display:none}
#help-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#help-modal.open{display:flex}
#help-box{background:var(--surface);border:1px solid var(--border);border-radius:.8rem;padding:1.2rem 1.5rem 1rem;max-width:720px;width:94%;box-shadow:0 24px 64px rgba(0,0,0,.6);position:relative;max-height:90vh;overflow-y:auto;}
#help-box h2{font-size:.95rem;font-weight:700;margin-bottom:.85rem;color:var(--green);letter-spacing:.04em}
.hclose{position:absolute;top:.75rem;right:.85rem;background:none;border:none;color:var(--muted);font-size:1.15rem;cursor:pointer;line-height:1;padding:.1rem .3rem;border-radius:.3rem;transition:color var(--tt);}
.hclose:hover{color:var(--text);background:var(--surface2)}
#help-cols{display:grid;grid-template-columns:1fr 1fr;gap:.5rem 1.4rem;}
.hgrid{display:grid;grid-template-columns:auto 1fr;gap:.28rem .8rem;font-size:.78rem;align-items:start;}
.hk{font-family:'JetBrains Mono',monospace;font-size:.72rem;background:var(--surface2);border:1px solid var(--border);border-radius:.28rem;padding:.1rem .38rem;color:var(--blue);white-space:nowrap;justify-self:start;}
.hd{color:var(--text);line-height:1.3}
.hs{font-size:.62rem;font-weight:700;letter-spacing:.09em;color:var(--muted);text-transform:uppercase;margin-top:.55rem;margin-bottom:.1rem;grid-column:1 / -1;}
.hs:first-child{margin-top:0}
#help-foot{margin-top:.85rem;font-size:.67rem;color:var(--muted);text-align:center}
#fs-hint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.68rem;padding:.26rem .6rem;border-radius:.4rem;pointer-events:none;opacity:0;transition:opacity .3s;z-index:50;}
body.fs-mode #fs-hint{opacity:1}
body.panel-hidden #fs-hint{opacity:1}
.pg{display:flex;align-items:center;gap:.36rem;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div id="canvas-wrap">
    <div id="split-divider"></div>
    <canvas id="annot-canvas"></canvas>
  </div>
  <div id="panel">
    <div class="pg">
      <label class="lbl" data-i18n="rows">Rows</label>
      <button class="btn btn-icon row-btn" id="r1" onclick="setRows(1)">1</button>
      <button class="btn btn-icon row-btn" id="r2" onclick="setRows(2)">2</button>
      <button class="btn btn-icon row-btn" id="r3" onclick="setRows(3)">3</button>
      <button class="btn btn-icon row-btn" id="r4" onclick="setRows(4)">4</button>
    </div>
    <button class="btn btn-red btn-icon" id="clear-btn" data-i18n-title="t_clear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
    <div class="sep"></div>
    <button id="loop-btn" class="btn btn-icon active" data-i18n-title="t_loop"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>
    <div class="popup-wrap" id="speed-wrap">
      <button id="speed-btn" class="btn btn-icon btn-green" data-i18n-title="t_speed"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></button>
      <div id="speed-menu" class="popup-menu">
        <label class="lbl" data-i18n="speed">Speed</label>
        <input type="range" id="speed-slider" min="0" max="8" value="4" step="1">
        <span id="speed-disp" class="popup-val">1.00x</span>
      </div>
    </div>
    <button id="loupe-btn" class="btn btn-icon" data-i18n-title="t_loupe"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><circle cx="11" cy="11" r="3" stroke-dasharray="2 2"/></svg></button>
    <button id="split-btn" class="btn btn-icon" data-i18n-title="t_split" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="8" height="16" rx="1"/><rect x="14" y="4" width="8" height="16" rx="1"/></svg></button>
    <button id="mute-btn" class="btn btn-icon" data-i18n-title="t_mute"></button>
    <div class="sep"></div>
    <div class="pg">
      <button id="prev-btn" class="btn btn-icon" data-i18n-title="t_prev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg></button>
      <button id="play-btn" class="btn" style="min-width:4rem" data-i18n="play">Play</button>
      <button id="next-btn" class="btn btn-icon" data-i18n-title="t_next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg></button>
    </div>
    <div class="sep"></div>
    <div class="pg">
      <label class="lbl" data-i18n="fps">FPS</label>
      <input type="number" id="fps-input" class="num-input" min="1" value="24" style="width:50px">
      <div id="frame-counter">0 / 0</div>
    </div>
    <input type="range" id="seek-slider" min="0" max="1000" value="0" disabled>
    <div id="time-block"><div id="timecode">00:00.00 / 00:00.00</div></div>
    <div class="sep"></div>
    <!-- New features -->
    <div class="pg">
      <button id="diff-btn" class="btn btn-icon" data-i18n-title="t_diff" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="12" r="6"/><circle cx="15" cy="12" r="6"/></svg></button>
      <div class="popup-wrap" id="tile-wrap">
        <button id="tile-btn" class="btn btn-icon" data-i18n-title="t_tile" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg></button>
        <div id="tile-menu" class="popup-menu">
          <label class="lbl" data-i18n="tile_grid">Grid</label>
          <div id="tile-grid-sel">
            <span class="tile-opt active" data-n="2">2x2</span>
            <span class="tile-opt" data-n="3">3x3</span>
            <span class="tile-opt" data-n="4">4x4</span>
          </div>
        </div>
      </div>
      <div class="popup-wrap" id="annot-wrap">
        <button id="annot-btn" class="btn btn-icon" data-i18n-title="t_annot" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
        <div id="annot-menu" class="popup-menu">
          <label class="lbl" data-i18n="annot_color">Color</label>
          <div id="annot-colors"></div>
          <div id="annot-size-row">
            <label class="lbl" data-i18n="annot_size">Size</label>
            <input type="range" id="annot-size" min="2" max="24" value="4" step="1">
            <span id="annot-size-disp" class="popup-val">4</span>
          </div>
          <button id="annot-clear-btn" class="btn btn-red" style="font-size:.72rem;padding:.28rem .6rem;width:100%" data-i18n="annot_clear">Clear</button>
        </div>
      </div>
    </div>
    <div class="sep"></div>
    <div class="pg">
      <input type="file" id="file-input" multiple accept="video/*,image/jpeg,image/png,image/gif,image/webp,image/avif,image/svg+xml,image/bmp,image/x-icon,image/apng">
      <button id="import-btn" class="btn btn-icon" style="background:var(--blue);color:#fff;border-color:transparent" data-i18n-title="t_open"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><polyline points="9 14 12 17 15 14"/></svg></button>
      <button id="export-btn" class="btn btn-icon btn-purple" data-i18n-title="t_export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
      <button id="theme-btn" class="btn btn-icon" data-i18n-title="t_theme"></button>
      <button id="help-btn" class="btn btn-icon btn-orange" data-i18n-title="t_help"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg></button>
    </div>
  </div>
</div>
<div id="fs-hint" data-i18n="fs_hint"></div>
<div id="help-modal" role="dialog" aria-modal="true">
  <div id="help-box">
    <h2 id="help-title"></h2>
    <button class="hclose" id="hclose">✕</button>
    <div id="help-cols">
      <div class="hgrid" id="hgrid-left"></div>
      <div class="hgrid" id="hgrid-right"></div>
    </div>
    <div id="help-foot"></div>
  </div>
</div>
<script>
// === APP IDENTITY ===
const APP_NAME='MediaSyncView',APP_VERSION='v2.0',APP_FOOT='Based on MediaSyncer by WhatDreamsCost, GPL-3.0';

// === I18N ===

// === SETUP ===
function setup(){
  const wrap=document.getElementById('canvas-wrap');
  const c=createCanvas(wrap.clientWidth,wrap.clientHeight);
  c.parent('canvas-wrap');
  c.id('p5-canvas');  // stable id for export
  c.dragOver(()=>{if(!document.getElementById('help-modal').classList.contains('open'))select('#canvas-wrap').style('border-style','solid')});
  c.dragLeave(()=>select('#canvas-wrap').style('border-style','dashed'));
  c.mouseWheel(handleWheel);
  // Also attach native wheel listener on the wrap so annot-canvas overlay doesn't block it
  document.getElementById('canvas-wrap').addEventListener('wheel',e=>{
    e.preventDefault();
    handleWheel(e);
  },{passive:false});
  frameRateInput=select('#fps-input');
  new ResizeObserver(()=>{
    const r=wrap.getBoundingClientRect();
    resizeCanvas(Math.floor(r.width),Math.floor(r.height));
    syncAnnotCanvas();applyThemeColors();
  }).observe(wrap);
  applyLang();initTheme();buildHelp();initAnnotCanvas();initAnnotColors();
  document.getElementById('import-btn').addEventListener('mousedown',e=>{e.stopPropagation();document.getElementById('file-input').click()});
  document.getElementById('file-input').addEventListener('change',handleFileInput);
  document.getElementById('help-btn').addEventListener('mousedown',e=>{e.stopPropagation();openHelp()});
  document.getElementById('hclose').addEventListener('mousedown',e=>{e.stopPropagation();closeHelp()});
  document.getElementById('help-modal').addEventListener('mousedown',e=>{if(e.target===document.getElementById('help-modal'))closeHelp()});
  document.getElementById('panel-btn')&&document.getElementById('panel-btn').addEventListener('mousedown',e=>{e.stopPropagation();togglePanel()});
  select('#theme-btn').mousePressed(toggleTheme);

// === DRAW ===
function draw(){
  background(canvasBg);
  if(isDraggingSplit)cursor('ew-resize');
  else if(annotActive)cursor('crosshair');
  else if(focusedMedia)cursor('default');
  else if(hoveredIdx!==-1&&!isDragging)cursor('grab');
  else if(mediaElements.length===0)cursor('pointer');
  else cursor('default');
  updateHovered();
  if(mediaElements.length===0&&!isDragging){
    textAlign(CENTER,CENTER);textSize(18);noStroke();fill(canvasText);
    text(LC.dragdrop,width/2,height/2);return;
  }
  if(focusedMedia)drawFocused();
  else if(diffActive&&mediaElements.length>=2)drawDiff();
  else if(tileActive&&mediaElements.length>=2)drawTile();
  else if(splitActive&&mediaElements.length===2)drawSplitView();
  else drawGrid();
  if(isDragging&&draggedMedia){
    const el=draggedMedia.elt;
    const rw=el.width||(el.elt&&el.elt.naturalWidth)||120;
    const rh=el.height||(el.elt&&el.elt.naturalHeight)||80;
    if(rw>0){const pw=120,ph=pw/(rw/rh);image(el,mouseX-pw/2,mouseY-ph/2,pw,ph);}
  }
  if(masterVideo&&!isSeeking)updateTimeline();

}

// === DIFFERENCE ===
function drawDiff(){
  const m0=mediaElements[0],m1=mediaElements[1];
  const el0=m0.elt,el1=m1.elt;
  const w0=el0.width||(el0.elt&&el0.elt.naturalWidth)||0,h0=el0.height||(el0.elt&&el0.elt.naturalHeight)||0;
  const w1=el1.width||(el1.elt&&el1.elt.naturalWidth)||0,h1=el1.height||(el1.elt&&el1.elt.naturalHeight)||0;
  if(!w0||!h0||!w1||!h1)return;
  const src0=el0 instanceof p5.Element?el0.elt:el0;
  const src1=el1 instanceof p5.Element?el1.elt:el1;
  const ca=width/height;
  // Letterbox both images
  const m0a=w0/h0;const fw0=ca>m0a?height*m0a:width,fh0=ca>m0a?height:width/m0a;
  const ox0=(width-fw0)/2,oy0=(height-fh0)/2;
  const m1a=w1/h1;const fw1=ca>m1a?height*m1a:width,fh1=ca>m1a?height:width/m1a;
  const ox1=(width-fw1)/2,oy1=(height-fh1)/2;
  // Draw first image normally, then second with difference blend
  drawingContext.save();
  drawingContext.globalCompositeOperation='source-over';
  drawingContext.drawImage(src0,ox0,oy0,fw0,fh0);
  drawingContext.globalCompositeOperation='difference';
  drawingContext.drawImage(src1,ox1,oy1,fw1,fh1);
  drawingContext.restore();
  push();noStroke();fill(0,0,0,160);textSize(11);textAlign(LEFT,TOP);
  const lbl=LC.diff;const lw=textWidth(lbl)+10;
  rect(0,0,lw,20,0,0,3,0);fill(0,229,160);text(lbl,5,5);pop();
}

// === TILE ===
function drawTile(){
  const m0=mediaElements[0],m1=mediaElements[1];
  const el0=m0.elt,el1=m1.elt;
  const w0=el0.width||(el0.elt&&el0.elt.naturalWidth)||0,h0=el0.height||(el0.elt&&el0.elt.naturalHeight)||0;
  const w1=el1.width||(el1.elt&&el1.elt.naturalWidth)||0,h1=el1.height||(el1.elt&&el1.elt.naturalHeight)||0;
  if(!w0||!h0||!w1||!h1)return;
  const src0=el0 instanceof p5.Element?el0.elt:el0;
  const src1=el1 instanceof p5.Element?el1.elt:el1;
  const ca=width/height;
  const m0a=w0/h0;const fw0=ca>m0a?height*m0a:width,fh0=ca>m0a?height:width/m0a;
  const ox0=(width-fw0)/2,oy0=(height-fh0)/2;
  const m1a=w1/h1;const fw1=ca>m1a?height*m1a:width,fh1=ca>m1a?height:width/m1a;
  const ox1=(width-fw1)/2,oy1=(height-fh1)/2;
  const ix=Math.max(ox0,ox1),iy=Math.max(oy0,oy1);
  const ix2=Math.min(ox0+fw0,ox1+fw1),iy2=Math.min(oy0+fh0,oy1+fh1);
  const iw=ix2-ix,ih=iy2-iy;
  if(iw<=0||ih<=0)return;
  const tw=iw/tileN,th=ih/tileN;
  // Track hovered tile
  tileHoverIdx=-1;
  for(let row=0;row<tileN;row++){
    for(let col=0;col<tileN;col++){
      const ti=row*tileN+col;
      const dx=ix+col*tw,dy=iy+row*th;
      if(mouseX>=dx&&mouseX<dx+tw&&mouseY>=dy&&mouseY<dy+th)tileHoverIdx=ti;
    }
  }
  for(let row=0;row<tileN;row++){
    for(let col=0;col<tileN;col++){
      const ti=row*tileN+col;
      const isA=ti%2===0;
      const src=isA?src0:src1;
      const ox=isA?ox0:ox1,oy=isA?oy0:oy1;
      const fw=isA?fw0:fw1,fh=isA?fh0:fh1;
      const dx=ix+col*tw,dy=iy+row*th;
      // Draw base tile
      drawingContext.save();
      drawingContext.beginPath();drawingContext.rect(dx,dy,tw,th);drawingContext.clip();
      drawingContext.drawImage(src,ox,oy,fw,fh);
      // On hover: draw the OPPOSITE image on top at 55% opacity
      if(tileHoverIdx===ti){
        const srcOpp=isA?src1:src0;
        const oxOpp=isA?ox1:ox0,oyOpp=isA?oy1:oy0;
        const fwOpp=isA?fw1:fw0,fhOpp=isA?fh1:fh0;
        drawingContext.globalAlpha=0.55;
        drawingContext.drawImage(srcOpp,oxOpp,oyOpp,fwOpp,fhOpp);
        drawingContext.globalAlpha=1.0;
      }
      drawingContext.restore();
      // L / R label
      push();noStroke();textAlign(LEFT,TOP);textSize(10);
      const lbl=isA?'L':'R';
      const lw=textWidth(lbl)+8,lh=16;
      fill(0,0,0,160);rect(dx+3,dy+3,lw,lh,2);
      fill(isA?color(0,229,160):color(168,85,247));text(lbl,dx+5,dy+5);
      pop();
      noFill();stroke(tileHoverIdx===ti?255:0,tileHoverIdx===ti?255:0,tileHoverIdx===ti?255:0,tileHoverIdx===ti?120:60);strokeWeight(1);rect(dx,dy,tw,th);noStroke();
    }
  }
  // Hint on hover
  if(tileHoverIdx!==-1){
    const isA=tileHoverIdx%2===0;
    push();noStroke();fill(0,0,0,150);textSize(10);textAlign(CENTER,BOTTOM);
    const hint=(isA?'L':'R')+' → '+(isA?'R':'L');
    text(hint,ix+iw/2,iy+ih-4);
    pop();
  }
}

// === LOUPE ===
function drawLoupe(){
  if(mediaElements.length!==1)return; // only with single media
  if(splitActive||diffActive||tileActive)return;
  if(mouseX<0||mouseX>width||mouseY<0||mouseY>height)return;
  const idx=hoveredIdx!==-1?hoveredIdx:0;
  const med=mediaElements[idx];if(!med)return;
  const el=med.elt;
  const mw=el.width||(el.elt&&el.elt.naturalWidth)||0;
  const mh=el.height||(el.elt&&el.elt.naturalHeight)||0;
  if(!mw||!mh)return;
  let pos=gridLayout[idx];if(!pos&&gridLayout[0])pos=gridLayout[0];if(!pos)return;

  // Loupe circle offset: bottom-right of cursor
  // Loupe centered ON cursor — cursor tip points to inspected pixel
  const lx=mouseX, ly=mouseY;

  // How many image pixels fit in one canvas pixel for each axis
  const scaleX=mw/pos.w, scaleY=mh/pos.h;
  // Source region size: LOUPE_R*2 canvas pixels → image pixels, square in canvas space
  const srcW=(LOUPE_R*2)*scaleX/LOUPE_ZOOM;
  const srcH=(LOUPE_R*2)*scaleY/LOUPE_ZOOM;
  // Center of crop in image coords
  const imgX=((mouseX-pos.x)/pos.w)*mw;
  const imgY=((mouseY-pos.y)/pos.h)*mh;
  const sx=Math.max(0,Math.min(imgX-srcW/2, mw-srcW));
  const sy=Math.max(0,Math.min(imgY-srcH/2, mh-srcH));

  const src=el instanceof p5.Element?el.elt:el;

  // Draw clipped circle at offset position
  drawingContext.save();
  drawingContext.beginPath();drawingContext.arc(lx,ly,LOUPE_R,0,Math.PI*2);drawingContext.clip();
  drawingContext.fillStyle=getComputedStyle(document.body).getPropertyValue('--canvas-bg').trim();
  drawingContext.fillRect(lx-LOUPE_R,ly-LOUPE_R,LOUPE_R*2,LOUPE_R*2);
  drawingContext.drawImage(src,sx,sy,srcW,srcH,lx-LOUPE_R,ly-LOUPE_R,LOUPE_R*2,LOUPE_R*2);
  drawingContext.restore();

  // Rim only, no crosshair
  noFill();stroke(255,255,255,200);strokeWeight(2);circle(lx,ly,LOUPE_R*2);noStroke();
}

// === SPLIT ===
function drawSplitView(){
  const sp=splitPos*width;const m0=mediaElements[0],m1=mediaElements[1];if(!m0||!m1)return;
  drawingContext.save();drawingContext.beginPath();drawingContext.rect(0,0,sp,height);drawingContext.clip();drawMediaFill(m0);drawingContext.restore();
  drawingContext.save();drawingContext.beginPath();drawingContext.rect(sp,0,width-sp,height);drawingContext.clip();drawMediaFill(m1);drawingContext.restore();
  drawSplitLabel(m0.name||'A',6,5,sp-12);drawSplitLabel(m1.name||'B',sp+6,5,width-sp-12);
}
function drawMediaFill(med){
  const el=med.elt;
  const mw=el.width||(el.elt&&el.elt.naturalWidth)||0;const mh=el.height||(el.elt&&el.elt.naturalHeight)||0;if(!mw||!mh)return;
  const sw=mw/zoomLevel,sh=mh/zoomLevel;const sx=(mw-sw)/2+panX,sy=(mh-sh)/2+panY;
  const ma=sw/sh;const dh=height,dw=height*ma;image(el,(width-dw)/2,(height-dh)/2,dw,dh,sx,sy,sw,sh);
}
function drawSplitLabel(name,x,y,maxW){
  push();textAlign(LEFT,TOP);textSize(11);noStroke();
  while(textWidth(name+'...')>maxW-8&&name.length>1)name=name.slice(0,-1);
  const tw=min(textWidth(name)+10,maxW),th=20;
  fill(0,0,0,170);rect(x,y,tw,th,3);fill(255);text(name,x+5,y+4);pop();
}

// === FOCUSED ===
function drawFocused(){
  if(!focusedMedia||!mediaElements.includes(focusedMedia)){focusedMedia=null;return;}
  const el=focusedMedia.elt;
  const mw=el.width||(el.elt&&el.elt.naturalWidth)||0;const mh=el.height||(el.elt&&el.elt.naturalHeight)||0;if(!mw||!mh)return;
  const ca=width/height,ma=mw/mh;const dw=ca>ma?height*ma:width,dh=ca>ma?height:width/ma;
  image(el,(width-dw)/2,(height-dh)/2,dw,dh);
  push();noStroke();textAlign(LEFT,TOP);textSize(11);const name=focusedMedia.name||'Media';const hint='Esc to exit';const pad=5;
  fill(0,0,0,170);rect(0,0,textWidth(name)+pad*2+2,20,0,0,3,0);fill(255);text(name,pad,pad);
  textAlign(RIGHT,TOP);fill(0,0,0,170);const hw=textWidth(hint)+pad*2;rect(width-hw,0,hw,20,0,0,0,3);fill(200,200,200);text(hint,width-pad,pad);pop();
}

// === GRID ===
function drawGrid(){
  let cols=gridCols||1,rows=gridRows||1;
  if(!gridCols||!gridRows){const g=bestGrid(mediaElements.length+(isDragging?1:0),width/height);cols=g.cols;rows=g.rows;}
  const cw=width/cols,ch=height/rows;
  const dropIdx=isDragging?floor(mouseX/cw)+floor(mouseY/ch)*cols:-1;
  gridLayout=[];let mi=0;
  for(let i=0;i<cols*rows;i++){
    const r=floor(i/cols),c=i%cols;
    if(isDragging&&i===dropIdx){noStroke();fill(255,255,255,22);rect(c*cw,r*ch,cw,ch,5);continue;}
    if(mi>=mediaElements.length)continue;
    const med=mediaElements[mi],el=med.elt;
    const rw=el.width||(el.elt&&el.elt.naturalWidth)||0;const rh=el.height||(el.elt&&el.elt.naturalHeight)||0;
    if(rw>0&&rh>0){
      const sw=rw/zoomLevel,sh=rh/zoomLevel;const sx=(rw-sw)/2+panX,sy=(rh-sh)/2+panY;
      const ca=cw/ch,ma=sw/sh;const dw=ca>ma?ch*ma:cw,dh=ca>ma?ch:cw/ma;
      const x=c*cw+(cw-dw)/2,y=r*ch+(ch-dh)/2;
      image(el,x,y,dw,dh,sx,sy,sw,sh);
      const pos={x,y,w:dw,h:dh};gridLayout[mi]=pos;
      if(mi===hoveredIdx&&!isDragging)drawOverlay(med,pos);
      if(med.type==='video')drawSoundDot(med,pos);
    }
    mi++;
  }
}
function drawOverlay(med,pos){
  const xs=22,pad=5;push();textAlign(LEFT,TOP);textSize(11);noStroke();
  let name=med.name;const maxW=pos.w-xs-pad*3;
  while(textWidth(name+'...')>maxW&&name.length>1)name=name.slice(0,-1);
  if(name!==med.name)name+='...';
  const tw=textWidth(name)+pad*2,th=14+pad*2;
  fill(0,0,0,180);rect(pos.x,pos.y,tw,th,3,0,3,0);fill(255);text(name,pos.x+pad,pos.y+pad+1);
  const bx=pos.x+pos.w-xs,by=pos.y;
  fill(0,0,0,180);rect(bx,by,xs,xs,0,3,0,3);fill(255);textAlign(CENTER,CENTER);textSize(14);text('x',bx+xs/2,by+xs/2);pop();
}
function drawSoundDot(med,pos){
  const bs=22,pad=4;const bx=pos.x+pos.w-bs-pad,by=pos.y+pos.h-bs-pad;
  push();noStroke();fill(med.muted?color(30,30,30,210):color(0,229,160,220));rect(bx,by,bs,bs,4);
  const cx=bx+bs*0.42,cy=by+bs/2;const sw=bs*0.13,sh=bs*0.18;
  fill(med.muted?color(120,120,120):color(0,0,0));noStroke();
  beginShape();vertex(cx-sw,cy-sh*0.8);vertex(cx,cy-sh*1.5);vertex(cx,cy+sh*1.5);vertex(cx-sw,cy+sh*0.8);endShape(CLOSE);
  rectMode(CORNER);rect(cx-sw*3.2,cy-sh*0.8,sw*2.2,sh*1.6,1);
  if(med.muted){stroke(200,60,60);strokeWeight(1.5);noFill();const x1=bx+bs*0.62,y1=by+bs*0.28,x2=bx+bs*0.88,y2=by+bs*0.72;line(x1,y1,x2,y2);line(x2,y1,x1,y2);}
  else{noFill();stroke(0,0,0,210);strokeWeight(1.4);const ax=cx+sw*0.5;arc(ax,cy,bs*0.22,bs*0.38,-PI*0.4,PI*0.4);arc(ax,cy,bs*0.38,bs*0.6,-PI*0.45,PI*0.45);}
  pop();
}
function updateHovered(){
  if(isDragging||splitActive||isDraggingSplit||diffActive||tileActive){hoveredIdx=-1;return;}
  hoveredIdx=-1;
  for(let i=0;i<gridLayout.length;i++){const p=gridLayout[i];if(p&&mouseX>p.x&&mouseX<p.x+p.w&&mouseY>p.y&&mouseY<p.y+p.h){hoveredIdx=i;break;}}
}
function bestGrid(n,aspect){
  if(!n)return{cols:1,rows:1};let best={cols:n,rows:1},minD=Infinity;
  for(let c=1;c<=n;c++){const r=Math.ceil(n/c),d=Math.abs(c/r-aspect);if(d<minD){minD=d;best={cols:c,rows:r};}}
  return best;
}

// === TIMELINE ===
function updateTimeline(){
  if(!masterVideo||isSeeking)return;
  const d=masterVideo.duration(),t=masterVideo.time();if(isNaN(d)||!d)return;
  const fps=parseFloat(frameRateInput.value())||24;const fd=1/fps;
  if(t>=d-fd){
    if(isLooping){
      isSeeking=true;videos.forEach(v=>v.pause());let done=0;const tot=videos.length;
      if(!tot){isSeeking=false;return;}
      videos.forEach(v=>{v.elt.onseeked=()=>{done++;v.elt.onseeked=null;if(done===tot){if(isPlaying)videos.forEach(vv=>vv.play());isSeeking=false;}};v.time(0);});return;
    } else {if(isPlaying)togglePlayPause();videos.forEach(v=>v.time(v.duration()));}
  } else if(isPlaying){videos.forEach(v=>{if(v!==masterVideo&&t>=v.duration()&&!v.elt.paused){v.pause();v.time(v.duration());}});}
  const ct=masterVideo.time();
  document.getElementById('seek-slider').value=(ct/d)*1000;
  document.getElementById('timecode').textContent=fmtTime(ct)+' / '+fmtTime(d);
  document.getElementById('frame-counter').textContent=Math.round(ct*fps)+' / '+Math.round(d*fps);
}
function fmtTime(t){if(isNaN(t)||t===Infinity)return'00:00.00';const m=floor(t/60),s=floor(t%60),h=floor((t%1)*100);return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(h).padStart(2,'0');}

function updateControls(){
  const hv=!!masterVideo,hasMedia=mediaElements.length>0,has2=mediaElements.length===2;
  ['play-btn','prev-btn','next-btn','seek-slider','speed-btn','loop-btn'].forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=!hv;});
  ['mute-btn'].forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=!hasMedia;});
  const lb=document.getElementById('loupe-btn');if(lb)lb.disabled=mediaElements.length!==1;
  document.getElementById('clear-btn').disabled=!hasMedia;
  const eb=document.getElementById('export-btn');if(eb)eb.disabled=false;
  if(!has2&&diffActive)setDiff(false);
  if(!has2&&tileActive)setTile(false);
  if(!has2&&splitActive){splitActive=false;document.body.classList.remove('split-active');document.getElementById('split-btn').classList.remove('active');}
  // annot disabled while playing video
  if(isPlaying&&annotActive)toggleAnnot();
  // recompute mutual exclusion disabled states
  _updateModeButtons();
}
function _updateModeButtons(){
  const has2=mediaElements.length===2,hasMedia=mediaElements.length>0;
  // split: enabled only if has2 and no diff/tile/annot active
  const sb=document.getElementById('split-btn');
  if(sb)sb.disabled=!has2||diffActive||tileActive||annotActive;
  // diff: enabled only if has2 and no split/tile/annot active
  const db=document.getElementById('diff-btn');
  if(db)db.disabled=!has2||splitActive||tileActive||annotActive;
  // tile: enabled only if has2 and no split/diff/annot active
  const tb=document.getElementById('tile-btn');
  if(tb)tb.disabled=!has2||splitActive||diffActive||annotActive;
  // annot: enabled only if hasMedia and no split/diff/tile active, and not playing
  const ab=document.getElementById('annot-btn');
  if(ab)ab.disabled=!hasMedia||splitActive||diffActive||tileActive||(isPlaying&&videos.length>0);
}
function updateMuteBtn(){
  const btn=document.getElementById('mute-btn');
  btn.innerHTML=globalMuted?ICONS.mute:ICONS.vol;
  btn.classList.toggle('mute-on',!globalMuted);btn.classList.toggle('mute-off',globalMuted);
  btn.classList.remove('active');btn.title=LC.t_mute;
}

// === FEATURE TOGGLES ===
function toggleDiff(){if(mediaElements.length<2)return;setDiff(!diffActive);}
function setDiff(v){
  diffActive=v;
  if(diffActive){setTile(false);if(splitActive){splitActive=false;document.body.classList.remove('split-active');document.getElementById('split-btn').classList.remove('active');}if(annotActive)toggleAnnot();}
  const btn=document.getElementById('diff-btn');
  btn.classList.toggle('active',diffActive);
  btn.style.background=diffActive?'var(--green)':'';
  btn.style.color=diffActive?'#000':'';
  btn.style.borderColor=diffActive?'transparent':'';
  _updateModeButtons();
}
function toggleTile(){if(mediaElements.length<2)return;setTile(!tileActive);}
function setTile(v){
  tileActive=v;
  if(tileActive){setDiff(false);if(splitActive){splitActive=false;document.body.classList.remove('split-active');document.getElementById('split-btn').classList.remove('active');}if(annotActive)toggleAnnot();}
  const btn=document.getElementById('tile-btn');
  btn.classList.toggle('active',tileActive);
  btn.style.background=tileActive?'var(--green)':'';
  btn.style.color=tileActive?'#000':'';
  btn.style.borderColor=tileActive?'transparent':'';
  _updateModeButtons();
}
function toggleLoupe(){
  if(mediaElements.length!==1&&!loupeActive)return; // only with single media
  loupeActive=!loupeActive;
  if(loupeActive&&annotActive)toggleAnnot(); // loupe and annot are incompatible
  const btn=document.getElementById('loupe-btn');
  btn.classList.toggle('active',loupeActive);
  btn.style.background=loupeActive?'var(--green)':'';
  btn.style.color=loupeActive?'#000':'';
  btn.style.borderColor=loupeActive?'transparent':'';
  document.body.classList.toggle('loupe-mode',loupeActive);
}
function toggleAnnot(){
  annotActive=!annotActive;
  if(!annotActive){
    // hide and clear canvas when deactivated
    document.body.classList.remove('annot-mode');
    clearAnnotCanvas();
    document.getElementById('annot-menu').classList.remove('open');
  } else {
    if(splitActive){splitActive=false;document.body.classList.remove('split-active');document.getElementById('split-btn').classList.remove('active');}
    if(diffActive)setDiff(false);
    if(tileActive)setTile(false);
    document.body.classList.add('annot-mode');
  }
  const btn=document.getElementById('annot-btn');
  btn.classList.toggle('active',annotActive);
  btn.style.background=annotActive?'var(--green)':'';
  btn.style.color=annotActive?'#000':'';
  btn.style.borderColor=annotActive?'transparent':'';
  _updateModeButtons();
}

// === ANNOTATION ===
function initAnnotCanvas(){
  const ac=document.getElementById('annot-canvas');syncAnnotCanvas();
  ac.addEventListener('mousedown',e=>{if(!annotActive)return;e.preventDefault();e.stopPropagation();annotDrawing=true;const r=ac.getBoundingClientRect();annotLastX=e.clientX-r.left;annotLastY=e.clientY-r.top;});
  ac.addEventListener('mousemove',e=>{
    if(!annotDrawing||!annotActive)return;
    const r=ac.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;
    const ctx=ac.getContext('2d');ctx.strokeStyle=annotColor;ctx.lineWidth=annotSize;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(annotLastX,annotLastY);ctx.lineTo(x,y);ctx.stroke();
    annotLastX=x;annotLastY=y;
  });
  window.addEventListener('mouseup',()=>{annotDrawing=false;});
}
function syncAnnotCanvas(){
  const wrap=document.getElementById('canvas-wrap');const ac=document.getElementById('annot-canvas');
  let imgData=null;const ctx=ac.getContext('2d');
  if(ac.width>0&&ac.height>0){try{imgData=ctx.getImageData(0,0,ac.width,ac.height);}catch(e){}}
  ac.width=wrap.clientWidth;ac.height=wrap.clientHeight;
  if(imgData)ctx.putImageData(imgData,0,0);
}
function clearAnnotCanvas(){const ac=document.getElementById('annot-canvas');ac.getContext('2d').clearRect(0,0,ac.width,ac.height);}
function initAnnotColors(){
  const container=document.getElementById('annot-colors');
  ANNOT_COLORS.forEach(c=>{
    const sw=document.createElement('div');sw.className='ac-swatch'+(c===annotColor?' active':'');
    sw.style.background=c;if(c==='#ffffff')sw.style.border='2px solid #555';
    sw.addEventListener('mousedown',e=>{
      e.stopPropagation();annotColor=c;
      document.querySelectorAll('.ac-swatch').forEach(x=>x.classList.remove('active'));sw.classList.add('active');
      if(!annotActive)toggleAnnot();
    });
    container.appendChild(sw);
  });
}

// === EXPORT ===
function exportView(){
  if(!mediaElements.length)return;
  // Use stable id set in setup() — querySelector would pick annot-canvas first when active
  const p5c=document.getElementById('p5-canvas');
  if(!p5c)return;
  const merged=document.createElement('canvas');
  merged.width=p5c.width;merged.height=p5c.height;
  const ctx=merged.getContext('2d');
  const bg=getComputedStyle(document.body).getPropertyValue('--canvas-bg').trim()||'#000000';
  ctx.fillStyle=bg;ctx.fillRect(0,0,merged.width,merged.height);
  ctx.drawImage(p5c,0,0);
  if(annotActive){const ac=document.getElementById('annot-canvas');if(ac)ctx.drawImage(ac,0,0);}
  merged.toBlob(blob=>{
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
    const ts=new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    a.download='msv-'+ts+'.png';a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);
  },'image/png');
}

// === THEME ===
function initTheme(){document.body.classList.toggle('light',localStorage.getItem('theme')==='light');applyTheme();}
function toggleTheme(){document.body.classList.toggle('light');localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');applyTheme();}
function applyTheme(){document.getElementById('theme-btn').innerHTML=document.body.classList.contains('light')?ICONS.moon:ICONS.sun;applyThemeColors();}
function applyThemeColors(){const s=getComputedStyle(document.body);canvasBg=color(s.getPropertyValue('--canvas-bg').trim());canvasText=color(s.getPropertyValue('--muted').trim());select('#canvas-wrap').style('border-color',s.getPropertyValue('--canvas-br').trim());}

// === I18N ===
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{const key=el.getAttribute('data-i18n');if(LC[key]!==undefined)el.textContent=LC[key];});
  document.querySelectorAll('[data-i18n-title]').forEach(el=>{const key=el.getAttribute('data-i18n-title');if(LC[key]!==undefined)el.title=LC[key];});
  const mb=document.getElementById('mute-btn');if(mb)mb.title=LC.t_mute;
}
function buildHelp(){
  document.getElementById('help-title').textContent=APP_NAME+' '+APP_VERSION+' — '+LC.help_title;
  document.getElementById('help-foot').textContent=APP_FOOT;
  const LEFT_SECTIONS=["k_playback"];
  const gL=document.getElementById("hgrid-left");
  const gR=document.getElementById("hgrid-right");
  gL.innerHTML="";gR.innerHTML="";
  let cur=null;
  for(const[k,v]of LC.keys){
    const kLabel=LC[k]||k;
    if(v===null){
      cur=LEFT_SECTIONS.includes(k)?"left":"right";
      const el='<div class="hs">'+kLabel+'</div>';
      if(cur==="left")gL.innerHTML+=el;else gR.innerHTML+=el;
    } else {
      const vLabel=LC[v]||v;
      const el='<span class="hk">'+kLabel+'</span><span class="hd">'+vLabel+'</span>';
      if(cur==="left")gL.innerHTML+=el;else gR.innerHTML+=el;
    }
  }
}
function openHelp(){document.getElementById('help-modal').classList.add('open');}
function closeHelp(){document.getElementById('help-modal').classList.remove('open');}

// === MEDIA ===
function handleFileInput(e){
  const files=e.target.files;if(!files)return;
  for(const f of files){const type=f.type.startsWith('video/')?'video':f.type.startsWith('image/')?'image':null;if(!type)continue;handleFile({type,data:URL.createObjectURL(f),name:f.name});}
  e.target.value='';
}
function handleFile(file){
  if(mediaElements.length>=MAX_MEDIA)return; // hard limit 32
  const rawType=file.type||'';
  const type=rawType==='video'||rawType==='image'?rawType:rawType.startsWith('video/')?'video':rawType.startsWith('image/')?'image':null;
  if(!type){select('#canvas-wrap').style('border-style','dashed');return;}
  file={...file,type};let el;
  if(file.type==='video'){
    const first=videos.length===0;
    el=createVideo(file.data,()=>{
      el.volume(globalMuted?0:1);el.speed(playbackRate);
      el.time(min(masterVideo?masterVideo.time():0,el.duration()));
      findMaster();
      if(first){
        togglePlayPause();
        if(typeof el.elt.requestVideoFrameCallback==='function'){
          const times=[];
          const cb=(now,meta)=>{
            times.push(meta.mediaTime);if(times.length<12){el.elt.requestVideoFrameCallback(cb);return;}
            const gaps=[];for(let i=1;i<times.length;i++)gaps.push(times[i]-times[i-1]);
            gaps.sort((a,b)=>a-b);const med=gaps[Math.floor(gaps.length/2)];
            if(med>0){const detected=Math.round(1/med);if(detected>=8&&detected<=240)document.getElementById('fps-input').value=detected;}
          };el.elt.requestVideoFrameCallback(cb);
        }
      } else if(isPlaying&&el.time()<el.duration())el.play();else el.pause();
      updateTimeline();
    });
    videos.push(el);
  } else {el=createImg(file.data);}
  el.hide();
  mediaElements.push({elt:el,type:file.type,name:file.name,muted:globalMuted});
  autoLayout();updateControls();_updateModeButtons();select('#canvas-wrap').style('border-style','dashed');
}
function findMaster(){
  if(!videos.length){masterVideo=null;if(isPlaying){isPlaying=false;document.getElementById('play-btn').textContent=LC.play;}}
  else{masterVideo=videos.reduce((a,b)=>a.duration()>b.duration()?a:b);}
  updateControls();_updateModeButtons();
}
function clearAll(){
  if(isPlaying)togglePlayPause();
  mediaElements.forEach(m=>m.elt.remove());
  mediaElements=[];videos=[];gridLayout=[];masterVideo=null;
  hoveredIdx=-1;isDragging=false;draggedMedia=null;isPlaying=false;focusedMedia=null;
  panX=0;panY=0;zoomLevel=1.0;playbackRate=1.0;
  document.getElementById('speed-slider').value=4;document.getElementById('speed-disp').textContent='1.00x';
  isLooping=true;select('#loop-btn').addClass('active');
  splitActive=false;document.body.classList.remove('split-active');document.getElementById('split-btn').classList.remove('active');
  setDiff(false);setTile(false);
  if(loupeActive)toggleLoupe();if(annotActive)toggleAnnot();clearAnnotCanvas();
  updateControls();_updateModeButtons();
  document.getElementById('seek-slider').value=0;document.getElementById('timecode').textContent='00:00.00 / 00:00.00';
  document.getElementById('frame-counter').textContent='0 / 0';document.getElementById('play-btn').textContent=LC.play;
  autoLayout();
}

// === PLAYBACK ===
function togglePlayPause(){
  if(!masterVideo)return;
  const t=masterVideo.time(),d=masterVideo.duration();const fd=1/(parseFloat(frameRateInput.value())||24);
  if(!isPlaying&&!isLooping&&t>=d-fd){videos.forEach(v=>{v.time(0);v.play()});isPlaying=true;document.getElementById('play-btn').textContent=LC.pause;return;}
  isPlaying=!isPlaying;
  if(isPlaying){videos.forEach(v=>{if(v.time()<v.duration())v.play()});document.getElementById('play-btn').textContent=LC.pause;}
  else{videos.forEach(v=>v.pause());document.getElementById('play-btn').textContent=LC.play;}
}
function stepFrame(dir){
  if(!masterVideo)return;if(isPlaying)togglePlayPause();
  const fps=parseFloat(frameRateInput.value())||24;
  const nt=constrain(masterVideo.time()+dir/fps,0,masterVideo.duration());
  isSeeking=true;let done=0,tot=videos.length;if(!tot){isSeeking=false;return;}
  videos.forEach(v=>{const vt=constrain(nt,0,v.duration());v.elt.onseeked=()=>{done++;v.elt.onseeked=null;if(done===tot)isSeeking=false;};v.time(vt);});
}
function toggleLooping(){
  isLooping=!isLooping;const btn=select('#loop-btn');
  if(isLooping){btn.addClass('active');if(!isPlaying&&masterVideo)togglePlayPause();}else btn.removeClass('active');
}
function doSeek(){
  if(!masterVideo)return;const d=masterVideo.duration();if(isNaN(d))return;
  isSeeking=true;const t=(document.getElementById('seek-slider').value/1000)*d;
  videos.forEach(v=>v.pause());let done=0,total=videos.length;
  const onDone=()=>{
    isSeeking=false;if(isPlaying)videos.forEach(v=>{if(v.time()<v.duration())v.play()});
    if(masterVideo){const ct=masterVideo.time(),d2=masterVideo.duration();if(!isNaN(d2)&&d2){const fps=parseFloat(frameRateInput.value())||24;document.getElementById('seek-slider').value=(ct/d2)*1000;document.getElementById('timecode').textContent=fmtTime(ct)+' / '+fmtTime(d2);document.getElementById('frame-counter').textContent=Math.round(ct*fps)+' / '+Math.round(d2*fps);}}
  };
  if(!total){onDone();return;}
  videos.forEach(v=>{const nt=min(t,v.duration());v.elt.onseeked=()=>{done++;v.elt.onseeked=null;if(done===total)onDone();};v.time(nt);});
}
function onSpeedChange(){playbackRate=SPEEDS[parseInt(document.getElementById('speed-slider').value)];document.getElementById('speed-disp').textContent=playbackRate.toFixed(2)+'x';videos.forEach(v=>v.speed(playbackRate));}

// === MUTE ===
function toggleGlobalMute(){globalMuted=!globalMuted;videos.forEach(v=>v.volume(globalMuted?0:1));mediaElements.forEach(m=>{if(m.type==='video')m.muted=globalMuted;});updateMuteBtn();}
function checkSoundDotClick(){
  const bs=22,pad=4;
  for(let i=0;i<gridLayout.length;i++){const med=mediaElements[i];if(!med||med.type!=='video')continue;const pos=gridLayout[i];if(!pos)continue;const bx=pos.x+pos.w-bs-pad,by=pos.y+pos.h-bs-pad;if(mouseX>=bx&&mouseX<=bx+bs&&mouseY>=by&&mouseY<=by+bs){med.muted=!med.muted;med.elt.volume(med.muted?0:1);return true;}}
  return false;
}

// === SPLIT ===
function toggleSplit(){
  if(mediaElements.length!==2)return;
  splitActive=!splitActive;
  if(splitActive){
    if(diffActive)setDiff(false);
    if(tileActive)setTile(false);
    if(annotActive)toggleAnnot();
  }
  document.body.classList.toggle('split-active',splitActive);
  document.getElementById('split-btn').classList.toggle('active',splitActive);
  const sb=document.getElementById('split-btn');
  sb.style.background=splitActive?'var(--green)':'';
  sb.style.color=splitActive?'#000':'';
  sb.style.borderColor=splitActive?'transparent':'';
  _updateModeButtons();
}

// === ZOOM/PAN ===
function clampPan(){
  if(!mediaElements.length){panX=panY=0;return;}
  const el=mediaElements[0].elt;const mw=el.width||(el.elt&&el.elt.naturalWidth)||0;const mh=el.height||(el.elt&&el.elt.naturalHeight)||0;
  if(!mw){panX=panY=0;return;}const mx=(mw-mw/zoomLevel)/2,my=(mh-mh/zoomLevel)/2;
  panX=mx>=0?constrain(panX,-mx,mx):0;panY=my>=0?constrain(panY,-my,my):0;
}
function handleWheel(e){
  const wrap=document.getElementById('canvas-wrap');
  const r=wrap.getBoundingClientRect();
  const mx=(e.clientX!==undefined?e.clientX:mouseX+r.left)-r.left;
  const my=(e.clientY!==undefined?e.clientY:mouseY+r.top)-r.top;
  if(mx<0||mx>r.width||my<0||my>r.height)return;
  if(!mediaElements.length)return;
  const spd=0.1,old=zoomLevel;
  zoomLevel+=e.deltaY<0?spd*old:-spd*old;
  zoomLevel=constrain(zoomLevel,1,10);
  const el=mediaElements[0].elt,mw=el.width||(el.elt&&el.elt.naturalWidth)||0,mh=el.height||(el.elt&&el.elt.naturalHeight)||0;
  if(mw>0){
    const wX=(panX+(mw-mw/old)/2)+(mx/width)*(mw/old);
    const wY=(panY+(mh-mh/old)/2)+(my/height)*(mh/old);
    panX=wX-(mx/width)*(mw/zoomLevel)-(mw-mw/zoomLevel)/2;
    panY=wY-(my/height)*(mh/zoomLevel)-(mh-mh/zoomLevel)/2;
  }
  clampPan();return false;
}

// === LAYOUT ===
function setRows(n){if(!mediaElements.length)return;gridRows=n;gridCols=Math.ceil(mediaElements.length/n);[1,2,3,4].forEach(i=>document.getElementById('r'+i).classList.toggle('active',i===n));}
function autoLayout(){gridCols=0;gridRows=0;[1,2,3,4].forEach(i=>document.getElementById('r'+i).classList.remove('active'));}

// === MOUSE ===
function mousePressed(){
  if(isDraggingSlider||isDraggingSplit||annotActive)return;
  if(mediaElements.length===0&&mouseX>0&&mouseX<width&&mouseY>0&&mouseY<height){if(mouseButton===LEFT)document.getElementById('file-input').click();return;}
  if(mouseButton===CENTER&&mouseX>0&&mouseX<width&&mouseY>0&&mouseY<height){if(focusedMedia){focusedMedia=null;return;}if(hoveredIdx!==-1)focusedMedia=mediaElements[hoveredIdx];return;}
  if(mouseButton!==LEFT||isDragging)return;
  if(focusedMedia){focusedMedia=null;return;}
  if(!splitActive&&!diffActive&&!tileActive&&checkSoundDotClick())return;
  if(hoveredIdx!==-1&&!splitActive&&!diffActive&&!tileActive){
    const pos=gridLayout[hoveredIdx],xs=22;
    if(mouseX>pos.x+pos.w-xs&&mouseX<pos.x+pos.w&&mouseY>pos.y&&mouseY<pos.y+xs){
      const rem=mediaElements.splice(hoveredIdx,1)[0];if(focusedMedia===rem)focusedMedia=null;
      if(rem.type==='video'){videos=videos.filter(v=>v!==rem.elt);findMaster();}else{updateControls();_updateModeButtons();}
      rem.elt.remove();hoveredIdx=-1;autoLayout();return;
    }
    isDragging=true;draggedMedia=mediaElements.splice(hoveredIdx,1)[0];
  }
}
function mouseDragged(){if(isDraggingSlider||isDraggingSplit)return;}
function mouseReleased(){
  isDraggingSlider=false;if(!isDragging||!draggedMedia){isDragging=false;return;}
  const g=(gridCols&&gridRows)?{cols:gridCols,rows:gridRows}:bestGrid(mediaElements.length+1,width/height);
  const cw=width/g.cols,ch=height/g.rows;
  let ti=constrain(floor(mouseX/cw),0,g.cols-1)+constrain(floor(mouseY/ch),0,g.rows-1)*g.cols;
  ti=min(ti,mediaElements.length);mediaElements.splice(ti,0,draggedMedia);isDragging=false;draggedMedia=null;
}

// === KEYBOARD ===
function handleKey(e){
  if(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA')return;
  const helpOpen=document.getElementById('help-modal').classList.contains('open');
  if(helpOpen){if(e.code==='Escape'||e.code==='KeyH')closeHelp();return;}
  if(e.code==='Escape'){if(annotActive){toggleAnnot();return;}if(loupeActive){toggleLoupe();return;}if(focusedMedia){focusedMedia=null;return;}return;}
  switch(e.code){
    case'Space':e.preventDefault();togglePlayPause();break;
    case'ArrowLeft':e.preventDefault();stepFrame(-1);break;
    case'ArrowRight':e.preventDefault();stepFrame(1);break;
    case'KeyF':case'F11':e.preventDefault();toggleFullscreen();break;
    case'KeyP':togglePanel();break;case'KeyH':openHelp();break;
    case'KeyO':document.getElementById('file-input').click();break;
    case'KeyT':toggleTheme();break;case'KeyD':toggleDiff();break;
    case'KeyQ':if(mediaElements.length>=2){if(!tileActive){setTile(true);togglePopup('tile-menu');}else toggleTile();}break;case'KeyA':if(mediaElements.length)toggleAnnot();break;
    case'KeyS':exportView();break;
    case'Digit1':setRows(1);break;case'Digit2':setRows(2);break;case'Digit3':setRows(3);break;case'Digit4':setRows(4);break;
    case'Digit5':clearAll();break;case'Digit6':toggleLooping();break;case'Digit7':togglePopup('speed-menu');break;
    case'Digit8':if(mediaElements.length)toggleLoupe();break;case'Digit9':toggleSplit();break;case'Digit0':toggleGlobalMute();break;
  }
}
function keyPressed(){return true;}
function togglePanel(){
  const isFs=document.body.classList.contains('fs-mode');const hint=document.getElementById('fs-hint');
  if(isFs){const vis=document.body.classList.toggle('panel-visible');if(hint)hint.textContent=vis?'':LC.fs_hint;}
  else{const hidden=document.body.classList.toggle('panel-hidden');if(hint)hint.textContent=hidden?'P — '+LC.toggle_panel:'';}
}
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen();}
